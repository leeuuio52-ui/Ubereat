    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root { --ue-green: #06C167; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }

        /* 動態液體背景 */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(45deg, #0a0a0a, #1a1a1a);
        }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(6, 193, 103, 0.15) 0%, transparent 70%);
            filter: blur(80px); animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        /* 高級玻璃特效 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--ue-green);
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(6, 193, 103, 0.2);
        }

        /* 呼吸字體特效 */
        .hero-title {
            background: linear-gradient(to bottom, #fff 30%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Line 呼吸燈 */
        .line-float {
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(6, 199, 85, 0.4);
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
