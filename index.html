         <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晴晴 Sunny | Uber Eats 頂尖策略顧問</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 嚴格保留你提供的原始樣式 */
        :root { --ue-green: #06C167; --text-light: #ffffff; --ue-card: rgba(255, 255, 255, 0.03); --border-glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Noto Sans TC', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .blob { 
            position: absolute; border-radius: 50%; 
            background: radial-gradient(circle, rgba(6, 193, 103, 0.12) 0%, transparent 70%); 
            filter: blur(80px); animation: move 20s infinite alternate; 
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .form-input {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-light);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--ue-green);
            box-shadow: 0 0 20px rgba(6, 193, 103, 0.2);
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Chatbot 按鈕 */
        .chatbot-toggle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ue-green), #00a84f);
            box-shadow: 0 10px 30px rgba(6, 193, 103, 0.4);
            animation: float 3s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 響應式 */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem !important; }
            .blob { width: 400px; height: 400px; }
        }

        /* 加載動畫 */
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--ue-card);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="blob" style="top: 5%; left: -5%;"></div>
        <div class="blob" style="bottom: 5%; right: -5%; animation-delay: -7s;"></div>
        <div class="blob" style="top: 50%; left: 40%; width: 300px; height: 300px; animation-delay: -12s; opacity: 0.5;"></div>
    </div>

    <nav id="navbar" class="fixed w-full z-50 py-6 px-4 sm:px-10 flex justify-between items-center backdrop-blur-md transition-all">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#06C167] rounded-full animate-pulse flex items-center justify-center">
                <span class="text-black font-bold text-lg">S</span>
            </div>
            <span class="font-bold tracking-tighter text-lg sm:text-xl hidden sm:inline uppercase">Sunny Strategy</span>
        </div>
        
        <a href="https://forms.gle/eLQfx53Gs38jpfkAA" target="_blank" class="bg-[#06C167] text-black px-6 py-2 rounded-full font-bold text-sm">
            立即免費諮詢
        </a>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <h1 class="hero-title text-5xl md:text-8xl font-black italic mb-8 uppercase tracking-tighter">
            Beyond <br> <span class="text-[#06C167]">Delivery.</span>
        </h1>
        <div class="relative group cursor-pointer" onclick="document.getElementById('imgModal').classList.add('active')">
             <div class="overflow-hidden rounded-[40px] border border-white/10 shadow-2xl" style="width: 300px; height: 420px;">
                <img src="https://i.postimg.cc/QKhwt7wM/Screenshot-20260506-003930-LINE-2.jpg" alt="Sunny" class="w-full h-full object-cover">
            </div>
        </div>
    </section>

    <div class="fixed bottom-10 right-10 z-50">
        <a href="https://line.me/ti/p/xd__vmNemf" target="_blank" class="chatbot-toggle">
            <i class="fa-brands fa-line text-4xl text-white"></i>
        </a>
    </div>

    <div id="imgModal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content text-center">
            <img src="https://i.postimg.cc/QKhwt7wM/Screenshot-20260506-003930-LINE-2.jpg" class="rounded-2xl mb-6 w-full">
            <button class="bg-[#06C167] text-black px-8 py-3 rounded-full font-bold">關閉視窗</button>
        </div>
    </div>

</body>
</html>
